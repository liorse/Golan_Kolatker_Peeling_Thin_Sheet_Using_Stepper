<?xml version="1.0" encoding="UTF-8"?>
<!-- Rear panel: 122 × 78 mm (plastic end cap). Scale: 4 px/mm -->
<svg xmlns="http://www.w3.org/2000/svg"
     width="568" height="392"
     viewBox="-24 -40 568 392">

  <!-- ── Panel body (plastic — lighter tone) ── -->
  <rect x="0" y="0" width="488" height="312"
        fill="#e8e8e8" stroke="#888" stroke-width="2"/>

  <!-- ── Screw holes (M3, r=12px, at corners 6mm in) ── -->
  <circle cx="24"  cy="24"  r="12" fill="white" stroke="#555" stroke-width="1.5"/>
  <circle cx="464" cy="24"  r="12" fill="white" stroke="#555" stroke-width="1.5"/>
  <circle cx="24"  cy="288" r="12" fill="white" stroke="#555" stroke-width="1.5"/>
  <circle cx="464" cy="288" r="12" fill="white" stroke="#555" stroke-width="1.5"/>

  <!-- ═══════════════════════════════════════════════════
       CUTOUT 1 — IEC C14 inlet / fuse (Schurter 4301.1400)
       Typical cutout: 28×22 mm, centred at x=25mm, y=39mm
       px centre: x=100, y=156   rect 112×88px
  ══════════════════════════════════════════════════════ -->
  <rect x="44" y="112" width="112" height="88"
        fill="white" stroke="#333" stroke-width="2"
        stroke-dasharray="6,3"/>
  <!-- IEC outline hint -->
  <rect x="54" y="122" width="92" height="68"
        fill="#ddd" stroke="#555" stroke-width="1" rx="4"/>
  <!-- fuse holder -->
  <rect x="82" y="136" width="36" height="20"
        fill="#bbb" stroke="#555" stroke-width="1" rx="2"/>
  <text x="100" y="220" text-anchor="middle"
        font-family="sans-serif" font-size="15" fill="#333">IEC C14 + Fuse</text>
  <text x="100" y="238" text-anchor="middle"
        font-family="sans-serif" font-size="12" fill="#666">Schurter 4301.1400</text>
  <text x="100" y="254" text-anchor="middle"
        font-family="sans-serif" font-size="12" fill="#666">28×22 mm · T1A fuse</text>

  <!-- ═══════════════════════════════════════════════════
       CUTOUT 2 — GX16-4 motor connector (ø16mm)
       Centre: x=72mm, y=39mm → px: x=288, y=156  r=32px
  ══════════════════════════════════════════════════════ -->
  <circle cx="288" cy="156" r="32"
          fill="white" stroke="#333" stroke-width="2"
          stroke-dasharray="6,3"/>
  <!-- connector body hint -->
  <circle cx="288" cy="156" r="26" fill="#888"/>
  <!-- 4 pin circles -->
  <circle cx="281" cy="149" r="5" fill="#ccc"/>
  <circle cx="295" cy="149" r="5" fill="#ccc"/>
  <circle cx="281" cy="163" r="5" fill="#ccc"/>
  <circle cx="295" cy="163" r="5" fill="#ccc"/>
  <text x="288" y="220" text-anchor="middle"
        font-family="sans-serif" font-size="15" fill="#333">MOTOR</text>
  <text x="288" y="238" text-anchor="middle"
        font-family="sans-serif" font-size="12" fill="#666">GX16-4</text>
  <text x="288" y="254" text-anchor="middle"
        font-family="sans-serif" font-size="12" fill="#666">ø16 mm</text>

  <!-- ═══════════════════════════════════════════════════
       CUTOUT 3 — Panel-mount micro-USB (programming)
       Typical mounting: 2× M2 holes + slot, centre x=103mm, y=39mm
       px centre: x=412, y=156
       Approximate slot: 12×6mm → 48×24px
  ══════════════════════════════════════════════════════ -->
  <rect x="388" y="144" width="48" height="24"
        fill="white" stroke="#333" stroke-width="2"
        stroke-dasharray="6,3" rx="4"/>
  <!-- USB port hint -->
  <rect x="393" y="149" width="38" height="14"
        fill="#aaa" stroke="#555" stroke-width="1" rx="2"/>
  <text x="412" y="220" text-anchor="middle"
        font-family="sans-serif" font-size="15" fill="#333">USB</text>
  <text x="412" y="238" text-anchor="middle"
        font-family="sans-serif" font-size="12" fill="#666">Micro-B panel-mount</text>
  <text x="412" y="254" text-anchor="middle"
        font-family="sans-serif" font-size="12" fill="#666">(firmware upload)</text>

  <!-- ── Dimension arrows & labels ── -->
  <line x1="0" y1="-16" x2="488" y2="-16" stroke="#444" stroke-width="1.5" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <text x="244" y="-22" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#444">122 mm</text>
  <line x1="-16" y1="0" x2="-16" y2="312" stroke="#444" stroke-width="1.5" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <text x="-20" y="160" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#444" transform="rotate(-90,-20,160)">78 mm</text>

  <!-- ── Title ── -->
  <text x="244" y="330" text-anchor="middle"
        font-family="sans-serif" font-size="18" font-weight="bold" fill="#222">
    Rear Panel — 122 × 78 mm
  </text>
  <text x="244" y="350" text-anchor="middle"
        font-family="sans-serif" font-size="13" fill="#666">
    Hammond 1455Q2202 · plastic end cap (drill to fit)
  </text>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#444"/>
    </marker>
  </defs>
</svg>
